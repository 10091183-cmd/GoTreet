<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GoTreet - Pedidos Web</title>
    <style>
        /* ESTE ES EL DISEÑO QUE LLEVABAS EN TU CAPTURA */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .tarjeta {
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            border-top: 8px solid #005a9c;
        }
        img {
            max-width: 180px;
            height: auto;
            margin-bottom: 20px;
        }
        h1 {
            color: #005a9c;
            margin-bottom: 10px;
        }
        p {
            color: #444;
            line-height: 1.6;
            font-size: 1.1em;
        }
        .boton-contacto {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 30px;
            background-color: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
        }
        .boton-contacto:hover {
            background-color: #218838;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="tarjeta">
        <!-- RECUERDA: El nombre de la imagen debe ser igual al del archivo -->
        <img src="Logo GoTreet.jpg" alt="Logotipo GoTreet">
        
        <h1>GoTreet</h1>
        
        <p>¿Quieres hacer una página web o comprarla? Has llegado al lugar correcto.</p>
        
        <p>En <strong>GoTreet</strong> creamos sitios web personalizados para promocionar tus proyectos o vender tus productos. Cuéntanos tu propósito y nosotros lo hacemos realidad.</p>

        <a href="https://wa.me" class="boton-contacto">Hacer un Pedido</a>
    </div>

</body>
</html>
